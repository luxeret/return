<!DOCTYPE html>
<html lang="ko" class="bg-gray-900 text-white">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Return Workspace</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/gh/toss/tossface/dist/tossface.css" rel="stylesheet" />
  <style>
    .tossface {
      font-family: Tossface;
      font-size: 1.5rem;
    }
    @font-face {
      font-family: 'Pretendard-Medium';
      src: url('https://fastly.jsdelivr.net/gh/Project-Noonnu/noonfonts_2107@1.1/Pretendard-Medium.woff') format('woff');
      font-weight: 400;
      font-style: normal;
    }
    @font-face {
      font-family: 'Pretendard-Light';
      src: url('https://fastly.jsdelivr.net/gh/Project-Noonnu/noonfonts_2107@1.1/Pretendard-Light.woff') format('woff');
      font-weight: 500;
      font-style: normal;
    }
    body {
      font-family: 'Pretendard-Light';
    }
  </style>
</head>
<body class="bg-gray-900 text-white min-h-screen">

  <!-- 상단 헤더, 주요 UI 등 그대로 유지 -->

  <header
    class="bg-gray-800 border-b border-gray-700 px-4 sm:px-8 py-3 sm:py-4 flex justify-between items-center sticky top-0 z-50"
  >
    <div class="text-xl sm:text-2xl font-bold text-gradient-gray select-none whitespace-nowrap">
      Return Workspace
    </div>
    <div class="flex items-center gap-3 sm:gap-4 min-w-0">
      <img
        id="userPhoto"
        class="w-8 h-8 rounded-full hidden flex-shrink-0"
        alt="프로필 사진"
        loading="lazy"
      />
      <span
        id="userName"
        class="text-sm sm:text-base text-gray-300 truncate max-w-[150px]"
        title="사용자명"
      >
        사용자님
      </span>
      <button
        id="logoutBtn"
        class="bg-gray-700 hover:bg-gray-600 text-white px-3 py-1.5 rounded-md text-sm sm:text-base whitespace-nowrap"
        type="button"
      >
        로그아웃
      </button>
    </div>
  </header>

  <main class="max-w-5xl mx-auto py-8 px-4 sm:px-6">
    <h1 class="text-2xl sm:text-3xl font-bold text-white mb-8">
      <span class="tossface">👋</span> 안녕하세요, <span id="welcomeUser">사용자님</span>
    </h1>

    <section class="bg-gray-800 rounded-2xl p-6 shadow border border-gray-700 min-h-[220px] mb-6">
      <h2 class="text-xl font-semibold mb-3">내 사용량 현황</h2>
      <p class="text-gray-400 mb-4">누적된 활동 정보를 요약합니다.</p>
      <ul class="space-y-2 text-gray-200 text-sm list-disc list-inside">
        <li>총 등록한 UUID: <span class="font-semibold">2개</span></li>
        <li>고유아이디 변경: <span class="font-semibold">5회</span></li>
        <li>최근 로그인: <span class="font-semibold">2025-07-20 10:05</span></li>
      </ul>
    </section>

    <section class="bg-gray-800 rounded-2xl p-6 shadow border border-gray-700 min-h-[180px] mb-6">
      <h2 class="text-xl font-semibold mb-3">라이선스 만료일</h2>
      <p class="text-gray-400 mb-3">현재 보유한 라이선스 상태입니다.</p>
      <p class="text-gray-300 font-bold text-xl">2025년 8월 10일</p>
      <p class="text-gray-400 mt-1">만료일까지 21일 남았습니다.</p>
    </section>

    <section class="bg-gray-800 rounded-2xl p-6 shadow border border-gray-700 min-h-[200px] mb-6">
      <h2 class="text-xl font-semibold mb-3">윈도우 UUID 관리</h2>
      <p class="text-gray-400 mb-4">UUID를 등록하거나 변경할 수 있습니다.</p>
      <button
        id="uuidRegisterBtn"
        disabled
        class="bg-gray-700 opacity-50 cursor-not-allowed text-white px-4 py-2.5 rounded-md text-sm"
      >
        UUID 등록
      </button>
    </section>

    <section class="bg-gray-800 rounded-2xl p-6 shadow border border-gray-700 min-h-[200px]">
      <h2 class="text-xl font-semibold mb-3">리턴 고유아이디 관리</h2>
      <p class="text-gray-400 mb-4">리턴 시스템의 고유아이디를 관리합니다.</p>
      <button
        id="returnIdRegisterBtn"
        disabled
        class="bg-gray-700 opacity-50 cursor-not-allowed text-white px-4 py-2.5 rounded-md text-sm"
      >
        등록
      </button>
    </section>
   </main>

  <script>
    // 로그아웃 버튼 이벤트
    document.getElementById("logoutBtn").addEventListener("click", () => {
      location.href = "https://returns.luxeret.com/login";
    });

    // OAuth2 code 파싱 및 토큰 교환
    (function () {
      const params = new URLSearchParams(window.location.search);
      const code = params.get("code");
      if (!code) {
        alert("코드가 없습니다. 다시 로그인해주세요.");
        location.href = "https://returns.luxeret.com/login";
        return;
      }

      fetch("https://returns.luxeret.com/api/auth", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ code }),
      })
        .then((res) => res.json())
        .then((data) => {
          if (data.error) {
            alert("오류가 발생했습니다. 다시 로그인해 주세요.");
            location.href = "https://returns.luxeret.com/login";
            return;
          }

          const user = data.user;
          const username = `${user.username}#${user.discriminator}`;
          document.getElementById("userName").textContent = username;
          document.getElementById("welcomeUser").textContent = username;

          const avatar = document.getElementById("userPhoto");
          if (user.avatar) {
            avatar.src = `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png`;
            avatar.classList.remove("hidden");
          }

          // 권한 체크 API 호출
          fetch(`https://returns.luxeret.com/check_permission?user_id=${user.id}`)
            .then((res) => res.json())
            .then((perm) => {
              if (perm.in_guild && perm.has_role) {
                ["uuidRegisterBtn", "returnIdRegisterBtn"].forEach((btnId) => {
                  const btn = document.getElementById(btnId);
                  if (btn) {
                    btn.disabled = false;
                    btn.classList.remove("opacity-50", "cursor-not-allowed");
                  }
                });
              } else {
                alert("서버 멤버이거나 역할이 없습니다. 기능 이용 권한이 없습니다.");
              }
            })
            .catch(() => {
              alert("권한 확인 중 오류가 발생했습니다.");
            });
        })
        .catch(() => {
          alert("로그인에 실패했습니다. 다시 시도해주세요.");
          location.href = "https://returns.luxeret.com/login";
        });
    })();
  </script>
  
</body>
</html>
