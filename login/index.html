<!DOCTYPE html>
<html lang="ko" class="bg-gray-900 text-white">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>리턴워크페이스 로그인</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex items-center justify-center h-screen bg-gray-900">
  <div id="loginBox" class="text-center p-6 bg-gray-800 rounded-2xl shadow-lg max-w-md w-full">
    <h1 class="text-3xl font-bold mb-6 text-white">리턴워크페이스 로그인</h1>
    <p class="mb-8 text-gray-400">계속하려면 디스코드 계정으로 로그인하세요.</p>
    <a
      href="https://discord.com/oauth2/authorize?client_id=1398944762299678822&response_type=code&redirect_uri=https%3A%2F%2Freturns.luxeret.com%2Fdashboard%2F&scope=identify"
      class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-6 rounded-xl transition duration-200 inline-flex items-center"
    >
      Discord로 로그인
    </a>
  </div>

  <div id="profileBox" class="hidden text-center p-6 bg-gray-800 rounded-2xl shadow-lg max-w-md w-full">
    <img id="avatar" class="w-24 h-24 mx-auto rounded-full mb-4" />
    <h2 id="username" class="text-xl font-bold"></h2>
    <p id="id" class="text-gray-400 text-sm"></p>
  </div>

  <script>
    async function handleAuth() {
      const urlParams = new URLSearchParams(window.location.search);
      const code = urlParams.get('code');
      if (!code) {
        // 로그인 페이지니까 로그인 버튼 보이고 종료
        return;
      }

      try {
        const res = await fetch('https://returns.luxeret.com/api/auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code }),
        });
        const data = await res.json();
        if (data.error) {
          alert('로그인 실패: ' + data.error);
          return;
        }
        // 로그인 박스 숨기기, 프로필 박스 보이기
        document.getElementById('loginBox').classList.add('hidden');
        document.getElementById('profileBox').classList.remove('hidden');

        const user = data.user;
        document.getElementById('avatar').src = `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png`;
        document.getElementById('username').innerText = `${user.username}#${user.discriminator}`;
        document.getElementById('id').innerText = `ID: ${user.id}`;

      } catch (err) {
        console.error(err);
        alert('로그인 중 오류가 발생했습니다.');
      }
    }

    handleAuth();
  </script>
</body>
</html>
