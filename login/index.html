<!DOCTYPE html>
<html lang="ko" class="bg-gray-900 text-white">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>리턴워크페이스 로그인</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/image/apple-touch-icon.png">
  <link rel="icon" type="image/ico" sizes="32x32" href="/assets/image/favicon.ico">
  <link rel="icon" type="image/ico" sizes="16x16" href="/assets/image/favicon.ico">
  <meta name="msapplication-TileColor" content="#da532c">
  <meta name="theme-color" content="#ffffff">
</head>
<body class="flex items-center justify-center h-screen bg-gray-900">
  <div class="text-center p-6 bg-gray-800 rounded-2xl shadow-lg max-w-md w-full">
    <h1 class="text-3xl font-bold mb-6 text-white">리턴워크페이스 로그인</h1>
    <p class="mb-8 text-gray-400">계속하려면 디스코드 계정으로 로그인하세요.</p>
    <a 
      href="https://discord.com/oauth2/authorize?client_id=1398944762299678822&response_type=token&redirect_uri=https%3A%2F%2Freturns.luxeret.com%2Fdashboard%2F&scope=identify%20guilds%20guilds.members.read"
      class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-6 rounded-xl transition duration-200 inline-flex items-center"
    >
      <svg class="w-6 h-6 mr-2" fill="currentColor" viewBox="0 0 24 24"><path d="M20.317 4.369a19.791 19.791 0 00-4.885-1.515.07.07 0 00-.074.035 13.825 13.825 0 00-.6 1.241 18.648 18.648 0 00-5.59 0 13.417 13.417 0 00-.617-1.24.071.071 0 00-.074-.036c-1.67.285-3.28.817-4.885 1.516a.061.061 0 00-.028.021C1.295 9.04.424 13.58.775 18.057a.082.082 0 00.03.056 19.888 19.888 0 006.008 3.06.07.07 0 00.079-.027c.463-.63.875-1.295 1.226-1.994a.074.074 0 00-.041-.104 13.146 13.146 0 01-1.872-.885.07.07 0 01-.007-.117c.126-.095.253-.192.373-.291a.07.07 0 01.07-.01c3.927 1.797 8.18 1.797 12.061 0a.07.07 0 01.071.009c.12.099.247.197.374.292a.07.07 0 01-.006.117c-.6.343-1.224.64-1.873.885a.074.074 0 00-.04.105c.36.698.773 1.362 1.225 1.993a.07.07 0 00.079.028 19.867 19.867 0 006.009-3.06.082.082 0 00.03-.056c.5-5.177-.838-9.673-3.548-13.667a.061.061 0 00-.028-.02zM8.02 15.331c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.418 2.157-2.418 1.21 0 2.175 1.093 2.157 2.418 0 1.334-.955 2.419-2.157 2.419zm7.974 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.418 2.157-2.418 1.21 0 2.175 1.093 2.157 2.418 0 1.334-.947 2.419-2.157 2.419z"/></svg>
      Discord로 로그인
    </a>
  </div>

  <!-- 팝업 -->
  <div id="errorPopup" class="fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center hidden">
    <div class="bg-white text-black rounded-xl p-6 shadow-xl max-w-sm w-full text-center">
      <h2 class="text-xl font-bold mb-4">접근 권한 오류</h2>
      <p class="mb-4">서버에 가입되어 있지 않거나<br>필수 역할이 없습니다.</p>
      <button onclick="document.getElementById('errorPopup').classList.add('hidden')" class="mt-2 px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700">
        닫기
      </button>
    </div>
  </div>

  <script>
    // 1. URL에서 access_token 추출
    const hash = window.location.hash;
    if (hash.includes("access_token")) {
      const params = new URLSearchParams(hash.substring(1));
      const token = params.get("access_token");
      if (token) {
        // URL 깔끔하게
        history.replaceState(null, null, window.location.pathname);

        // 2. 유저가 서버에 가입했는지 확인
        fetch("https://discord.com/api/users/@me/guilds/858300001247690824/member", {
          headers: {
            Authorization: `Bearer ${token}`
          }
        })
        .then(res => {
          if (!res.ok) throw new Error("not in guild");
          return res.json();
        })
        .then(data => {
          const roles = data.roles || [];
          const requiredRole = "1188634595135070369";

          if (!roles.includes(requiredRole)) {
            document.getElementById("errorPopup").classList.remove("hidden");
          } else {
            // ✅ 통과: 대시보드로 이동
            window.location.href = "/dashboard/";
          }
        })
        .catch(err => {
          console.error(err);
          document.getElementById("errorPopup").classList.remove("hidden");
        });
      }
    }
  </script>
</body>
</html>
