<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>리턴 최적화 구매하기</title>
  <style>
    @font-face {
      font-family: 'Pretendard-Medium';
      src: url('https://fastly.jsdelivr.net/gh/Project-Noonnu/noonfonts_2107@1.1/Pretendard-Medium.woff') format('woff');
      font-weight: 400;
      font-style: normal;
    }

    @font-face {
      font-family: 'Pretendard-Bold';
      src: url('https://fastly.jsdelivr.net/gh/Project-Noonnu/noonfonts_2107@1.1/Pretendard-Bold.woff') format('woff');
      font-weight: 700;
      font-style: normal;
    }

    @font-face {
      font-family: 'Pretendard-ExtraBold';
      src: url('https://fastly.jsdelivr.net/gh/Project-Noonnu/noonfonts_2107@1.1/Pretendard-ExtraBold.woff') format('woff');
      font-weight: 800;
      font-style: normal;
    }

    @font-face {
      font-family: 'Pretendard-Regular';
      src: url('https://fastly.jsdelivr.net/gh/Project-Noonnu/noonfonts_2107@1.1/Pretendard-Regular.woff') format('woff');
      font-weight: 300;
      font-style: normal;
    }

    body {
      font-family: Pretendard-Regular;
      margin: 0;
      padding: 0;
      background-color: #000;
      color: #fff;
    }

    .container {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      padding: 20px;
    }

    .box {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 30px;
      border-radius: 20px;
      position: relative;
      width: 428px;
      max-width: 90%;
      padding-left: 40px;
      padding-right: 40px;
    }

    .section {
      padding: 20px;
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .section h2 {
      text-align: center;
      margin-bottom: 20px;
      font-size: 22px;
      font-family: Pretendard-ExtraBold;
    }

    .image-box, .payment-box {
      height: 250px;
      background-color: #fff;
      color: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 20px;
    }

    .image-box img {
      max-width: 100%;
      max-height: 100%;
      border-radius: 20px;
    }

    .price-box {
      display: flex;
      justify-content: space-between;
      align-items: center;
      text-align: left;
      font-size: 18px;
      margin-bottom: -3px;
      padding: 15px;
      background-color: #666;
      color: #fff;
      border-radius: 10px;
      width: 100%;
      box-sizing: border-box;
      flex-wrap: wrap;
    }

    .price-box strong {
      font-size: 22px;
      margin-right: 2px;
    }

    .price-box .price-note {
      font-size: 12px;
      color: #aaa;
      margin-left: 2px;
    }

    .price-box .coupon-button {
      background-color: #444;
      color: #fff;
      font-size: 16px;
      padding: 8px 12px;
      border-radius: 5px;
      cursor: pointer;
      border: none;
      width: auto;
      margin-left: auto;
    }

    .price-box .coupon-button:hover {
      background-color: #555;
    }

    .coupon-button {
      margin-left: 10px;
      flex-shrink: 0;
    }

    .price-note {
      font-size: 12px;
      color: #aaa;
      margin-left: 5px;
    }

    .pay-button {
      background-color: #ffffff;
      color: #000000;
      font-size: 20px;
      font-family: Pretendard-Bold;
      border-radius: 10px;
      padding: 12px;
      margin-top: 5px;
      cursor: pointer;
      border: none;
      text-align: center;
      width: 100%;
      box-sizing: border-box;
    }

    .pay-button:hover {
      background-color: #f3f3f3;
    }

    .footer {
      text-align: center;
      font-size: 14px;
      margin-top: 20px;
    }

    .footer a {
      color: #fff;
      text-decoration: none;
      margin: 0 10px;
    }

    .footer a:hover {
      text-decoration: underline;
    }

    .receipt-box {
      background-color: #333;
      color: #fff;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 10px;
      width: 100%;
      box-sizing: border-box;
    }

    .receipt-box .item {
      display: flex;
      justify-content: space-between;
      margin-bottom: 5px;
    }

    .receipt-box .item:last-child {
      margin-bottom: 0;
    }

    .receipt-box .item .label {
      font-size: 14px;
    }

    .receipt-box .item .value {
      font-size: 14px;
      font-family: Pretendard-Bold;
    }

    .receipt-title {
      font-size: 18px;
      font-family: Pretendard-Bold;
      margin-top: 20px;
      margin-bottom: 10px;
      text-align: center;
    }

    .popup {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background-color: rgba(0, 0, 0, 0.8);
      padding: 20px;
      border-radius: 10px;
      width: 80%;
      max-width: 400px;
      color: white;
    }

    .popup-content {
      background-color: #222;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
    }

    .popup input {
      padding: 10px;
      font-size: 16px;
      width: 80%;
      margin-bottom: 10px;
      border-radius: 5px;
      border: 1px solid #444;
      color: white;
      background-color: #333;
    }

    .popup button {
      padding: 10px;
      font-size: 16px;
      background-color: #444;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 10px;
    }

    .popup button:hover {
      background-color: #555;
    }

    .invalid-code {
      color: red;
      font-size: 12px;
      margin-top: 5px;
    }

    /* 쿠폰 입력란 애니메이션 */
    .coupon-input-container {
      display: none;
      position: absolute;
      top: 0;
      left: 100%;
      width: 100%;
      transition: transform 0.5s ease-in-out;
      z-index: 10;
      padding: 10px;
      background-color: #444;
      border-radius: 10px;
    }

    .coupon-input-container.show {
      display: block;
      transform: translateX(-100%);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="box">
      <div class="section">
        <h2>리턴 최적화 구매하기</h2>

        <div class="receipt-box" id="receipt-box" style="display:none;">
          <div class="item">
            <span class="label">적용된 할인:</span>
            <span class="value" id="coupon-discount">-3,000원</span>
          </div>
          <div class="item">
            <span class="label">최종 가격:</span>
            <span class="value" id="final-price">12,000원</span>
          </div>
        </div>

        <div class="price-box" id="price-box">
          <div>
            <strong class="price" id="original-price">15,000원</strong>
            <span class="price-note">(컴퓨터 1대당)</span>
          </div>
          <button class="coupon-button" onclick="showCouponInput()">쿠폰 적용</button>
        </div>

        <div class="coupon-input-container" id="coupon-input-container">
          <input type="text" id="coupon-code" placeholder="쿠폰 코드를 입력하세요" />
          <button onclick="applyCoupon()">적용</button>
          <button onclick="cancelCoupon()">취소</button>
          <div class="invalid-code" id="invalid-code" style="display:none;">올바르지 않은 코드입니다.</div>
        </div>

        <button class="pay-button">결제하기</button>
        <div class="footer">
          <a href="https://return-tos.notion.site/16e734f2a2ea80ddb5d2f36dbe0e8801">청약철회</a> |
          <a href="https://return-tos.notion.site/16e734f2a2ea800d874bee78846b772a">서비스 이용약관</a> |
          <a href="https://pf.kakao.com/_qxenQG">고객센터</a> |
          <a href="https://www.ftc.go.kr/bizCommPop.do?wrkr_no=4840303394">사업자정보 확인</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    const validCouponCode = '1234';
    const originalPrice = 15000;

    function showCouponInput() {
      document.getElementById('coupon-input-container').classList.add('show');
    }

    function applyCoupon() {
      const couponCode = document.getElementById('coupon-code').value;

      if (couponCode === validCouponCode) {
        const discount = originalPrice * 0.30;
        const finalPrice = originalPrice - discount;

        document.getElementById('coupon-discount').textContent = `-${discount.toLocaleString()}원`;
        document.getElementById('final-price').textContent = `${finalPrice.toLocaleString()}원`;

        document.getElementById('original-price').textContent = `${finalPrice.toLocaleString()}원`;

        document.getElementById('coupon-input-container').classList.remove('show');
        document.getElementById('receipt-box').style.display = 'block';
      } else {
        document.getElementById('invalid-code').style.display = 'block';
      }
    }

    function cancelCoupon() {
      document.getElementById('coupon-input-container').classList.remove('show');
      document.getElementById('invalid-code').style.display = 'none';
    }
  </script>
</body>
</html>
